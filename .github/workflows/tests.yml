name: Build & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    name: Build & Test
    runs-on: windows-latest   # WPF + WinForms target net9.0-windows
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore TimelapseCapture.sln

      - name: Build (Release)
        run: dotnet build TimelapseCapture.sln --no-restore --configuration Release

      - name: Test (Release)
        run: dotnet test TimelapseCapture.sln --no-build --configuration Release --verbosity normal
